<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTN - Pantalla de Espera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #8832d9 0%, #5ebfdb 100%);
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }

        .waiting-screen {
            text-align: center;
            animation: fadeInOut 4s ease-in-out infinite;
        }

        .logo {
            font-size: 120px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .status {
            font-size: 18px;
            opacity: 0.7;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .loading-dots {
            display: inline-block;
        }

        .loading-dots span {
            animation: blink 1.4s infinite;
            margin: 0 5px;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.5; }
            30% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="waiting-screen">
        <div class="logo">🎬</div>
        <h1>RTN</h1>
        <div class="subtitle">Tu Canal en Directo</div>
        <div class="status">
            Esperando transmisión
            <div class="loading-dots">
                <span>.</span>
                <span>.</span>
                <span>.</span>
            </div>
        </div>
    </div>

    <script>
        // Cambiar el emoji cada 5 segundos
        const emojis = ['🎬', '📺', '🎥', '🌟', '✨'];
        let emojiIndex = 0;

        setInterval(() => {
            emojiIndex = (emojiIndex + 1) % emojis.length;
            document.querySelector('.logo').textContent = emojis[emojiIndex];
        }, 5000);
    </script>
</body>
</html>
